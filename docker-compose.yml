

services:
  postgres:
    image: postgres:15-alpine
    container_name: claf_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-campus_lost_and_found}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: 
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: claf_api
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-campus_lost_and_found}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-dGhpc2lzYXRlc3RrZXl0aGF0aXMyNTZiaXQ=}
      - PORT=8080
      - UPLOAD_DIR=/app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - postgres
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: claf_web
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
